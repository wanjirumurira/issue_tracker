version: '3.8'

services:
  db:
    image: postgres:12
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - djangonetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    expose:
      - 8000
    volumes:
      - static_volume:/home/app/web/staticfiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - djangonetwork

  nginx:
    build: ./nginx
    ports:
      - 8080:80
    volumes:
      - static_volume:/home/app/web/staticfiles
    depends_on:
      - backend
    networks:
      - djangonetwork
    restart: always

volumes:
  static_volume:
  pg_data:

networks:
  djangonetwork:
    driver: bridge
